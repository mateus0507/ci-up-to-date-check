# Nome do workflow que aparecerá na aba "Actions" do GitHub
# Esse nome também pode aparecer como status check em Pull Requests
name: Require latest main commit

# Define quando o workflow será executado
on:
  # O workflow roda sempre que um Pull Request for aberto, atualizado ou sincronizado
  pull_request:

# Início da definição dos jobs (tarefas principais da pipeline)
jobs:

  # Identificador interno do job
  up_to_date_with_main:

    # Nome do job que aparecerá na interface do GitHub
    # Esse nome pode ser marcado como "required status check" na proteção da branch
    name: up-to-date-main

    # Define o ambiente onde o job será executado
    # Neste caso, uma máquina virtual Ubuntu fornecida pelo GitHub
    runs-on: ubuntu-latest

    # Lista de passos que serão executados dentro do job
    steps:

      # Passo 1: Fazer checkout do código do Pull Request
      - name: Checkout do código do PR

        # Usa a action oficial do GitHub para baixar o código do repositório
        uses: actions/checkout@v4

        with:
          # fetch-depth: 0 baixa TODO o histórico do git
          # Isso é necessário porque vamos comparar commits entre branches
          # Se fosse depth 1, só viria o último commit e a comparação falharia
          fetch-depth: 0

      # Passo 2: Buscar a branch main do repositório remoto
      - name: Buscar referência da main

        # git fetch baixa a referência da main do repositório remoto (origin)
        # --no-tags evita baixar tags desnecessárias e deixa mais rápido
        run: git fetch origin main --no-tags

      # Passo 3: Verificar se a branch do PR contém o último commit da main
      - name: Validar se a branch contém o último commit da main

        # O símbolo | permite escrever múltiplos comandos shell
        run: |

          # Pega o SHA (identificador único) do último commit da main remota
          MAIN_SHA=$(git rev-parse origin/main)

          # Pega o commit mais recente que existe em comum entre:
          # - a branch atual (HEAD)
          # - a main
          # Esse comando encontra o "ponto de origem" entre as duas branches
          BASE_SHA=$(git merge-base HEAD origin/main)

          # Mostra no log da pipeline qual é o commit atual da main
          echo "origin/main     = $MAIN_SHA"

          # Mostra qual é o commit base entre a branch do PR e a main
          echo "merge-base      = $BASE_SHA"

          # Se os commits forem diferentes significa que:
          # a main avançou e a branch do PR não foi atualizada
          if [ "$MAIN_SHA" != "$BASE_SHA" ]; then

            # Mensagem informando que a branch está desatualizada
            echo "Sua branch está desatualizada em relação à main."

            # Instrução para o desenvolvedor atualizar a branch
            echo "Atualize a branch com a main antes de continuar."

            # exit 1 faz o job falhar
            # Isso impede o merge quando a branch protection estiver ativada
            exit 1
          fi

          # Se os commits forem iguais significa que a branch contém o último commit da main
          # Então a verificação passa com sucesso
          echo "OK: a branch contém o commit mais recente da main."