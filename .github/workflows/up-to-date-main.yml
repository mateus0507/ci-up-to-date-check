name: Up-to-date-main (required) #define o nome do workflow

# Quer dizer:
# Crie um workflow chamado "Up-to-date-main (required)" que será executado sempre que um Pull Request tentar enviar código para a branch main
# roda sempre que um PR (pull request) for aberto/atualizado apontando para a main
on: #define o evento que vai disparar o workflow
  pull_request: #Significa que o workflow será executado quando acontecer algo relacionado a um Pull Request.
    branches: ["main"] #o workflow só roda se o PR está apontando para a main

jobs: #define os trabalhos (jobs) que essa pipeline vai executar
  up_to_date: #identificador interno do job usado pelo workflow
    name: up-to-date-main #nome exibido no GitHub Actions para identificar o job durante a execução
    runs-on: ubuntu-latest #define o sistema operacional do runner onde o job será executado

    steps: #define a sequencia de passos que o job vai executar

      # 1) Baixa o código do PR (a branch do dev) para a VM do Actions
      - name: Checkout PR branch #nome do passo
        uses: actions/checkout@v4 #utiliza a action oficial do GitHub para clonar o repositorio no ambiente da pipeline
        with: #define os parametros para a action
          fetch-depth: 0 #baixa todo o historico do git, permitindo comparações corretas entre commits e branches

      # 2) Garante que temos a main atual (origin/main) disponível no runner
      # Motivo:
      # - O checkout baixa a branch do PR.
      # - Mas para comparar com a main, precisamos TER a referência origin/main localmente.
      # - Aqui fazemos um fetch explícito, garantindo que origin/main exista (evita erro "ambiguous argument origin/main").
      - name: Fetch main #nome do passo
        run: | #comandos para executar no terminal do runner
          # --no-tags: não baixa tags (mais rápido e não precisamos delas)
          # --prune: remove referências antigas
          # +refs/heads/main:refs/remotes/origin/main:
          #   baixa a branch main do remoto e grava exatamente como origin/main no runner
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main

          # Debug (opcional): confirma que origin/main existe
          git rev-parse --verify origin/main

      # 3) Verifica se a branch do PR contém o ÚLTIMO commit da main
      # Ideia (o "commit 10 vs commit 9"):
      # - Pegamos o hash do commit mais recente da main (origin/main)
      # - Calculamos o merge-base entre HEAD (branch do PR) e origin/main
      # - Se o merge-base NÃO for o mesmo hash do tip da main, significa que o PR está atrás (não tem o último commit)
      - name: Fail if PR branch is behind main #nome do passo
        run: | #comando para ser executado no terminal do runner
          # Debug: imprime os hashes para facilitar entender o que está acontecendo
          echo "=== Debug info ==="
          echo "Main tip (origin/main): $(git rev-parse origin/main)" #hash do commit mais recente da main remota
          echo "PR tip (HEAD):          $(git rev-parse HEAD)"        #hash do commit atual da branch do PR

          # merge-base = último commit em comum entre a branch do PR e a main
          # (é o ponto onde as duas histórias se encontram)
          base=$(git merge-base HEAD origin/main)
          main_tip=$(git rev-parse origin/main)

          echo "Merge-base:             $base"
          echo "======================="

          # Regra:
          # Se o merge-base NÃO for o tip da main,
          # significa que a branch do PR NÃO inclui a main mais recente (está desatualizada).
          if [ "$base" != "$main_tip" ]; then
            echo "❌ BLOCKED: sua branch está ATRÁS da main (não contém o último commit da main)."
            echo ""
            echo "Como resolver (trazer o último commit da main para sua branch):"
            echo "  Opção 1 (merge):  git fetch origin && git merge origin/main && git push"
            echo "  Opção 2 (rebase): git fetch origin && git rebase origin/main && git push --force-with-lease"
            exit 1 #encerra com erro -> o job falha -> o PR fica bloqueado (se o check for obrigatório na proteção da branch)
          fi

          # Se chegou aqui, a branch do PR já contém o último commit da main
          echo "✅ OK: sua branch contém o último commit da main."

