# Nome do workflow que aparecerá na aba "Actions" do GitHub
# Esse nome também aparece como check quando alguém abre um Pull Request
name: Require latest main commit

# Define quando o workflow será executado
# Neste caso ele roda sempre que um Pull Request for criado ou atualizado
on:
  pull_request:
    # O workflow só será executado se o PR estiver tentando entrar na branch "main"
    branches: ["main"]

# Define os jobs (tarefas principais) que o workflow irá executar
jobs:

  # Identificador interno do job
  up_to_date:

    # Nome exibido no GitHub Actions para este job
    # Esse é o nome do "status check" que pode ser marcado como obrigatório na branch protection
    name: up-to-date-main

    # Define o sistema operacional da máquina (runner) que executará o job
    # O GitHub cria uma máquina virtual temporária com Ubuntu
    runs-on: ubuntu-latest

    # Lista de passos que o job irá executar em sequência
    steps:

      # =========================================================
      # PASSO 1 - Fazer checkout do código do Pull Request
      # =========================================================

      # Faz o download (clone) do código do PR para a máquina do GitHub Actions
      # Isso permite que os comandos git rodem sobre o repositório
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 baixa todo o histórico do Git
          # Isso é necessário porque o comando git merge-base precisa do histórico completo
          fetch-depth: 0


      # =========================================================
      # PASSO 2 - Buscar a branch main do repositório remoto
      # =========================================================

      # Esse passo garante que a referência origin/main exista no runner
      # Sem isso podem ocorrer erros como:
      # "fatal: ambiguous argument 'origin/main'"
      - name: Fetch main reference
        run: |
          # git fetch baixa atualizações do repositório remoto sem alterar o código local

          # --no-tags
          # não baixa tags do repositório, deixando o comando mais rápido
          
          # --prune
          # remove referências remotas antigas que já foram deletadas no repositório
          
          # +refs/heads/main:refs/remotes/origin/main
          # baixa a branch main do remoto e salva exatamente como origin/main
          # isso garante que podemos comparar HEAD com origin/main
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main

          # Confirma que origin/main existe
          # Se não existir, o workflow falhará aqui
          git rev-parse --verify origin/main


      # =========================================================
      # PASSO 3 - Verificar se a branch do PR contém o último commit da main
      # =========================================================

      # Regra da tarefa:
      #
      # Exemplo:
      #
      # main:
      # 8 ---- 9 ---- 10
      #
      # PR:
      # 8 ---- 9
      #
      # Nesse caso o PR NÃO contém o commit 10 → PR deve falhar
      #
      # Se o PR fizer:
      #
      # 8 ---- 9 ---- 10 ---- 11
      #
      # Então o PR contém o commit 10 → PR pode passar
      #
      - name: Block PR if branch is behind main
        run: |

          # Mensagem inicial para facilitar leitura no log do GitHub Actions
          echo "=== Checking if PR branch contains the latest main commit ==="

          # Obtém o hash do commit mais recente da main remota
          # Esse é o "último commit da main" (ex: commit 10)
          main_tip=$(git rev-parse origin/main)

          # merge-base encontra o último commit em comum entre duas branches
          # HEAD = commit atual da branch do PR
          # origin/main = commit atual da main
          #
          # Se o PR estiver atualizado com a main,
          # o merge-base deve ser exatamente igual ao main_tip
          base=$(git merge-base HEAD origin/main)

          # Imprime informações úteis para debug no log da pipeline
          echo "Main tip (origin/main): $main_tip"
          echo "Merge-base:             $base"
          echo "PR tip (HEAD):          $(git rev-parse HEAD)"

          # Compara o merge-base com o último commit da main
          #
          # Se forem diferentes:
          # significa que a branch do PR NÃO contém o commit mais recente da main
          if [ "$base" != "$main_tip" ]; then

            # Mensagem de erro que aparecerá no log do GitHub Actions
            echo "❌ BLOCKED: Sua branch NÃO contém o último commit da main."
            echo ""
            echo "Você está tentando abrir PR com a branch desatualizada (ex: main=10 e você=9)."
            echo ""

            # Instruções para o desenvolvedor atualizar a branch
            echo "Como resolver:"
            echo "  Opção 1 (merge):  git fetch origin && git merge origin/main && git push"
            echo "  Opção 2 (rebase): git fetch origin && git rebase origin/main && git push --force-with-lease"

            # exit 1 faz o step falhar
            # quando o step falha, o job falha
            # quando o job falha, o PR fica bloqueado
            exit 1
          fi

          # Se passou na verificação, significa que a branch do PR contém o último commit da main
          echo "✅ OK: Sua branch contém o último commit da main."
          echo "Agora você pode alterar o que quiser e commitar por cima (ex: virar commit 11)."


