name: Require latest main commit #nome do workflow (o check vai aparecer assim no PR)

# Esse workflow roda quando um Pull Request for aberto/atualizado apontando para a branch main
on:
  pull_request:
    branches: ["main"] #só roda em PRs que tentam entrar na main

jobs:
  up_to_date:
    name: up-to-date-main #nome do job (esse é o "status check" que você vai marcar como obrigatório)
    runs-on: ubuntu-latest

    steps:
      # 1) Faz checkout do código do PR (a branch do dev)
      # fetch-depth: 0 = histórico completo, necessário para git merge-base funcionar corretamente
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Busca a branch main do remoto e garante que a referência origin/main exista no runner
      # Isso evita o erro: "fatal: ambiguous argument 'origin/main'"
      - name: Fetch main reference
        run: |
          # --no-tags: não baixa tags (mais rápido)
          # --prune: limpa refs antigas
          # +refs/heads/main:refs/remotes/origin/main:
          #   baixa a main do remoto e salva exatamente como origin/main
          git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main

          # confirma que origin/main existe
          git rev-parse --verify origin/main

      # 3) Verifica se a branch do PR contém o ÚLTIMO commit da main
      # REGRA DA TAREFA:
      # - main está no commit 10
      # - PR está no commit 9 (não contém o commit 10) -> falha
      # - PR contém o commit 10 e faz commit 11 em cima -> passa
      - name: Block PR if branch is behind main
        run: |
          echo "=== Checking if PR branch contains the latest main commit ==="

          # hash do commit mais recente da main remota (o "último commit", ex: commit 10)
          main_tip=$(git rev-parse origin/main)

          # merge-base = último commit em comum entre HEAD (PR) e origin/main
          # Se a branch do PR estiver atualizada, o merge-base deve ser exatamente o main_tip
          base=$(git merge-base HEAD origin/main)

          echo "Main tip (origin/main): $main_tip"
          echo "Merge-base:             $base"
          echo "PR tip (HEAD):          $(git rev-parse HEAD)"

          # Se o merge-base for diferente do tip da main, o PR NÃO inclui o último commit da main
          if [ "$base" != "$main_tip" ]; then
            echo "❌ BLOCKED: Sua branch NÃO contém o último commit da main."
            echo ""
            echo "Você está tentando abrir PR com a branch desatualizada (ex: main=10 e você=9)."
            echo ""
            echo "Como resolver:"
            echo "  Opção 1 (merge):  git fetch origin && git merge origin/main && git push"
            echo "  Opção 2 (rebase): git fetch origin && git rebase origin/main && git push --force-with-lease"
            exit 1
          fi

          echo "✅ OK: Sua branch contém o último commit da main."
          echo "Agora você pode alterar o que quiser e commitar por cima (ex: virar commit 11)."

